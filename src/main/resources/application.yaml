spring:
  profiles:
    # HTTPS (SSL bundles, :8443, https:// downstreams) is the default runtime profile.
    # Tests activate a different profile (or none) so they can run against plain HTTP
    # fixtures without provisioning certificates.
    default: https
  http:
    clients:
      connect-timeout: 2s
      read-timeout: 5s
      reactive:
        connector: reactor
    serviceclient:
      account-group:
        base-url: http://localhost:8081
        read-timeout: 2s
      account:
        base-url: http://localhost:8083
        read-timeout: 3s
      owners:
        base-url: http://localhost:8084
        read-timeout: 3s
  webflux:
    problemdetails:
      enabled: true
  reactor:
    context-propagation: auto

springdoc:
  api-docs:
    path: /api/v1/v3/api-docs
  swagger-ui:
    path: /api/v1/swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
    access:
      default: none
  endpoint:
    health:
      access: read-only
      probes:
        enabled: true
    info:
      access: read-only
    metrics:
      access: read-only
  metrics:
    tags:
      application: aggregation-gateway

logging:
  pattern:
    correlation: "[%X{requestId:-},%X{correlationId:-}] "

---
spring:
  config:
    activate:
      on-profile: https
  ssl:
    bundle:
      pem:
        server:
          keystore:
            certificate: "classpath:certs/dev/server.crt"
            private-key: "classpath:certs/dev/server.key"
        downstream:
          truststore:
            certificate: "classpath:certs/dev/downstream-ca.crt"
  http:
    serviceclient:
      account-group:
        base-url: https://localhost:8081
      account:
        base-url: https://localhost:8083
      owners:
        base-url: https://localhost:8084

server:
  port: 8443
  ssl:
    bundle: server
